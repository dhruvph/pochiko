<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Pochiko's Memory Graph</title>
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #c0c0d0;
    --text-dim: #606078;
    --accent: #7c6ff7;
    --accent-glow: rgba(124,111,247,0.15);
    --green: #4ade80;
    --pink: #f472b6;
    --orange: #fb923c;
    --cyan: #22d3ee;
    --blue: #60a5fa;
    --yellow: #facc15;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }

  #app {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 56px 1fr;
    height: 100vh;
  }

  /* Header */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  header h1 span { color: var(--accent); }

  .filters {
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Graph */
  #cy {
    background: var(--bg);
    position: relative;
  }

  #cy::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, var(--accent-glow), transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(96,165,250,0.05), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Detail panel */
  #detail-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 24px;
    overflow-y: auto;
  }

  #detail-panel h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }

  #detail-panel .type-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }

  .type-person .type-badge { background: rgba(124,111,247,0.2); color: var(--accent); }
  .type-project .type-badge { background: rgba(74,222,128,0.15); color: var(--green); }
  .type-tool .type-badge { background: rgba(96,165,250,0.15); color: var(--blue); }
  .type-concept .type-badge { background: rgba(244,114,182,0.15); color: var(--pink); }
  .type-location .type-badge { background: rgba(251,146,60,0.15); color: var(--orange); }
  .type-infrastructure .type-badge { background: rgba(34,211,238,0.15); color: var(--cyan); }
  .type-domain .type-badge { background: rgba(250,204,21,0.15); color: var(--yellow); }
  .type-self .type-badge { background: rgba(124,111,247,0.25); color: var(--accent); }

  .connections-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin: 20px 0 10px;
  }

  .connection-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: color 0.15s;
  }

  .connection-item:hover { color: var(--accent); }
  .connection-item:last-child { border-bottom: none; }

  .conn-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .conn-label {
    font-size: 13px;
    color: var(--text-dim);
    min-width: 80px;
  }

  .conn-name { font-size: 13px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    text-align: center;
    gap: 8px;
  }

  .empty-state .icon { font-size: 40px; opacity: 0.5; }
  .empty-state p { font-size: 13px; max-width: 200px; line-height: 1.5; }

  /* Stats */
  .stats {
    display: flex;
    gap: 16px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .stat { text-align: center; flex: 1; }
  .stat-num { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🧠 <span>Memory</span> Graph</h1>
    <div class="filters">
      <button class="filter-btn active" data-group="all">All</button>
      <button class="filter-btn" data-group="people">People</button>
      <button class="filter-btn" data-group="projects">Projects</button>
      <button class="filter-btn" data-group="tools">Tools</button>
      <button class="filter-btn" data-group="concepts">Concepts</button>
      <button class="filter-btn" data-group="infrastructure">Infra</button>
      <button class="filter-btn" data-group="domains">Domains</button>
    </div>
  </header>
  <div id="cy"></div>
  <div id="detail-panel">
    <div class="empty-state">
      <div class="icon">🔍</div>
      <p>Click a node to explore its connections</p>
    </div>
  </div>
</div>

<script>
const GROUP_COLORS = {
  people: '#7c6ff7',
  self: '#a78bfa',
  projects: '#4ade80',
  tools: '#60a5fa',
  concepts: '#f472b6',
  locations: '#fb923c',
  infrastructure: '#22d3ee',
  domains: '#facc15',
  books: '#e879f9',
  systems: '#94a3b8',
};

let cy;
let currentFilter = 'all';

fetch('./graph-data.json')
  .then(r => r.json())
  .then(data => {
    initGraph(data);
  });

function initGraph(data) {
  const elements = [
    ...data.nodes.map(n => ({
      data: { id: n.id, label: n.label, group: n.group, type: n.type, url: n.url || null }
    })),
    ...data.edges.map(e => ({
      data: { id: `${e.source}-${e.target}`, source: e.source, target: e.target, label: e.label }
    }))
  ];

  cy = cytoscape({
    container: document.getElementById('cy'),
    elements,
    style: [
      {
        selector: 'node',
        style: {
          'label': 'data(label)',
          'background-color': ele => GROUP_COLORS[ele.data('group')] || '#666',
          'color': '#c0c0d0',
          'font-size': '10px',
          'font-family': 'Inter, sans-serif',
          'text-valign': 'bottom',
          'text-margin-y': 6,
          'width': ele => ele.data('group') === 'self' ? 36 : 24,
          'height': ele => ele.data('group') === 'self' ? 36 : 24,
          'border-width': 2,
          'border-color': ele => GROUP_COLORS[ele.data('group')] || '#666',
          'border-opacity': 0.5,
          'overlay-opacity': 0,
        }
      },
      {
        selector: 'edge',
        style: {
          'width': 1.5,
          'line-color': '#2a2a3a',
          'target-arrow-color': '#2a2a3a',
          'target-arrow-shape': 'triangle',
          'curve-style': 'bezier',
          'arrow-scale': 0.8,
        }
      },
      {
        selector: 'node:selected',
        style: {
          'border-width': 3,
          'border-opacity': 1,
          'width': 32,
          'height': 32,
        }
      },
      {
        selector: '.highlighted',
        style: {
          'line-color': '#7c6ff7',
          'target-arrow-color': '#7c6ff7',
          'width': 2.5,
        }
      },
      {
        selector: '.dimmed',
        style: {
          'opacity': 0.15,
        }
      }
    ],
    layout: {
      name: 'cose',
      animate: false,
      nodeRepulsion: 8000,
      idealEdgeLength: 80,
      edgeElasticity: 100,
      nestingFactor: 1.2,
      gravity: 0.8,
      numIter: 1000,
    },
    minZoom: 0.3,
    maxZoom: 3,
    wheelSensitivity: 0.3,
  });

  // Node click → show detail panel
  cy.on('tap', 'node', (evt) => {
    const node = evt.target;
    showDetail(node);
    highlightConnections(node);
  });

  cy.on('tap', (evt) => {
    if (evt.target === cy) {
      clearHighlight();
      showEmpty();
    }
  });

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.group;
      applyFilter(currentFilter);
    });
  });

  // Update stats
  updateStats(data);
}

function showDetail(node) {
  const data = node.data();
  const panel = document.getElementById('detail-panel');

  const groupColor = GROUP_COLORS[data.group] || '#666';

  // Get connections
  const connected = [];
  node.connectedEdges().forEach(edge => {
    const other = edge.source().id() === data.id ? edge.target() : edge.source();
    connected.push({
      name: other.data('label'),
      id: other.id(),
      group: other.data('group'),
      label: edge.data('label'),
      direction: edge.source().id() === data.id ? 'out' : 'in',
    });
  });

  // Sort: outgoing first
  connected.sort((a, b) => (a.direction === 'out' ? -1 : 1));

  panel.className = `type-${data.type}`;
  panel.innerHTML = `
    <h2>${data.label}</h2>
    <div class="type-badge" style="background:${groupColor}22;color:${groupColor}">${data.group}</div>
    ${data.url ? `<div style="margin-bottom:16px"><a href="${data.url}" target="_blank" style="color:var(--accent);font-size:13px;text-decoration:none">↗ Open link</a></div>` : ''}
    <div class="connections-title">Connections (${connected.length})</div>
    ${connected.map(c => `
      <div class="connection-item" data-node-id="${c.id}">
        <div class="conn-dot" style="background:${GROUP_COLORS[c.group] || '#666'}"></div>
        <span class="conn-label">${c.direction === 'out' ? c.label : c.label}</span>
        <span class="conn-name">${c.name}</span>
      </div>
    `).join('')}
  `;

  // Make connection items clickable
  panel.querySelectorAll('.connection-item').forEach(item => {
    item.addEventListener('click', () => {
      const targetNode = cy.getElementById(item.dataset.nodeId);
      if (targetNode) {
        cy.nodes().unselect();
        targetNode.select();
        showDetail(targetNode);
        highlightConnections(targetNode);
      }
    });
  });
}

function showEmpty() {
  const panel = document.getElementById('detail-panel');
  panel.className = '';
  panel.innerHTML = `
    <div class="empty-state">
      <div class="icon">🔍</div>
      <p>Click a node to explore its connections</p>
    </div>
  `;
}

function highlightConnections(node) {
  cy.elements().removeClass('highlighted dimmed');
  const connected = node.closedNeighborhood();
  cy.elements().not(connected).addClass('dimmed');
  node.connectedEdges().addClass('highlighted');
}

function clearHighlight() {
  cy.elements().removeClass('highlighted dimmed');
}

function applyFilter(group) {
  cy.elements().removeClass('dimmed');
  if (group === 'all') {
    cy.elements().style('display', 'element');
  } else {
    cy.nodes().forEach(n => {
      if (n.data('group') !== group) {
        n.style('display', 'none');
      } else {
        n.style('display', 'element');
      }
    });
    cy.edges().forEach(e => {
      const srcVis = e.source().style('display') !== 'none';
      const tgtVis = e.target().style('display') !== 'none';
      e.style('display', (srcVis && tgtVis) ? 'element' : 'none');
    });
  }
}

function updateStats(data) {
  const panel = document.getElementById('detail-panel');
  const statsHtml = `
    <div class="stats">
      <div class="stat"><div class="stat-num">${data.nodes.length}</div><div class="stat-label">Nodes</div></div>
      <div class="stat"><div class="stat-num">${data.edges.length}</div><div class="stat-label">Edges</div></div>
      <div class="stat"><div class="stat-num">${[...new Set(data.nodes.map(n => n.group))].length}</div><div class="stat-label">Groups</div></div>
    </div>
  `;
  panel.innerHTML += statsHtml;
}
</script>
</body>
</html>
