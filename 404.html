<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA fallback with custom domain: redirect /path -> /#/path
    var path = location.pathname + location.search;
    if (path && path !== '/') {
      location.replace('/#' + path);
    } else {
      location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
